name: JA4+
before: |
  <p>
    Arkime supports JA4 and JA4+ algorithms starting from version 5 onwards.
  </p>
  <h4>JA4 algorithm</h4>
  <p>
    JA4, the TLS Client Fingerprinting portion, is built directly into the Arkime capture binary.
    After installing Arkime 5 or later, you will automatically see the <code>tls.ja4</code> field show up &mdash; no extra configuration or plugin is required.
  </p>

  <h4>JA4+ algorithms</h4>
  <p class="alert alert-secondary">
    <span class="fa fa-exclamation-triangle">
    </span>
    JA4+ algorithms have licensing requirements.
    Please <a href="https://github.com/FoxIO-LLC/ja4#licensing">familiarize</a> yourself with them before installing/enabling the JA4+ portions of Arkime.
  </p>

  <div>
    The JA4+ algorithms are shipped as a separate capture plugin. To install and enable them:
    <ul>
      <li>Download the plugin matching your OS and CPU architecture. Make sure you download the plugin from the same Arkime release as the version of Arkime you are running &mdash; mismatched versions will not load. The following builds are provided:
        <ul>
          <li><code>ja4plus.amd64.so</code> &mdash; Linux x86_64 (Intel/AMD 64-bit)</li>
          <li><code>ja4plus.arm64.so</code> &mdash; Linux ARM64 (aarch64)</li>
          <li><code>ja4plus.freebsd-amd64.so</code> &mdash; FreeBSD x86_64</li>
        </ul>
      </li>
      <li>Copy the downloaded plugin to the <code>/opt/arkime/plugins</code> directory on every machine that runs capture.</li>
      <li>Edit <code>/opt/arkime/etc/config.ini</code> and add the plugin filename to the <code>plugins=</code> line, for example: <code>plugins=ja4plus.amd64.so</code> (use the filename that matches the plugin you downloaded).</li>
      <li>Restart capture. The new JA4+ fields will be created and populated automatically on new sessions.</li>
    </ul>
  </div>


settings:
  - key: ja4Raw
    value: "false"
    text: |
      Enable to generate the JA4 raw Arkime fields.

  - key: ja4hOmitZeroSections
    value: "false"
    text: |
      Enable to omit zero sections in JA4 hashes.
      This will reduce the size of the JA4 hashes, but may cause search issues if those are expected.
