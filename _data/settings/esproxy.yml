settings:
  - key: elasticsearch
    value: http://localhost:9200
    text: The OpenSearch/Elasticsearch URL to use, <code>dbUrl</code> overrides this setting

  - key: elasticsearchAPIKey
    value: EMPTY
    text: See [settings page](settings#elasticsearchAPIKey)

  - key: elasticsearchBasicAuth
    value: EMPTY
    text: See [settings page](settings#elasticsearchBasicAuth)

  - key: elasticsearchTimeout
    value: 300
    text: See [settings page](settings#elasticsearchtimeout)

  - key: esClientKey
    value: EMPTY
    text: See [settings page](settings#esclientkey)

  - key: esClientCert
    value: EMPTY
    text: See [settings page](settings#esclientcert)

  - key: esClientKeyPass
    value: EMPTY
    text: See [settings page](settings#esclientkeypass)

  - key: caTrustFile
    value: EMPTY
    text: See [settings page](settings#caTrustFile)

  - key: debug
    value: 0
    text: The debug level to use if NO --debug options are given. The higher the number, the more information is logged.

  - key: prefix
    value: EMPTY
    text: It is possible for multiple Arkime clusters to use the same OpenSearch/Elasticsearch cluster by giving each Arkime cluster a different prefix value. The prefix value will be used in all index names that Arkime creates.

  - key: esProxyHost
    value: EMPTY
    text: The IP address used to listen, usually localhost for just localhost or 0.0.0.0 for all IP addresses, see the [host section](https://nodejs.org/docs/latest-v8.x/api/net.html#net_server_listen_port_host_backlog_callback)

  - key: esProxyPort
    value: 7200
    text: Port that <code>esProxy</code> listens on

  - key: esProxySigV4
    value: "false"
    text: (Since 6.1.0) Enable AWS SigV4 signing for requests to managed OpenSearch

  - key: esProxySigV4Region
    value: EMPTY
    text: (Since 6.1.0) AWS region for SigV4 signing (required when esProxySigV4 is true)

  - key: esProxySigV4Service
    value: es
    text: (Since 6.1.0) AWS service name for SigV4 signing

  - key: esProxySigV4AccessKeyId
    value: EMPTY
    text: (Since 6.1.0) AWS access key ID for SigV4 signing

  - key: esProxySigV4SecretAccessKey
    value: EMPTY
    text: (Since 6.1.0) AWS secret access key for SigV4 signing

  - key: esProxySigV4SessionToken
    value: EMPTY
    text: (Since 6.1.0) AWS session token for SigV4 signing (for temporary credentials)

  - key: esProxySigV4RoleArn
    value: EMPTY
    text: (Since 6.1.0) AWS IAM role ARN to assume for SigV4 signing

  - key: esProxySigV4CredentialUrl
    value: EMPTY
    text: (Since 6.1.0) URL to fetch AWS credentials from for SigV4 signing

  - key: esProxySigV4CredentialCert
    value: EMPTY
    text: (Since 6.1.0) Client certificate for fetching AWS credentials

  - key: esProxySigV4CredentialKey
    value: EMPTY
    text: (Since 6.1.0) Client key for fetching AWS credentials
